<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cosmos — app</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A0B; --panel:#0F0F11; --panel2:#131316;
    --fg:#FAFAFA; --dim:#8F9099; --faint:#55565E;
    --line:#1C1D21; --acc:#CDA6F2; --green:#3ECF8E; --amberr:#E8B45A; --redd:#E86A6A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;font-size:13.5px;line-height:1.55;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--acc);color:#000}
  .mono{font-family:'Geist Mono',monospace}
  .label{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  button{font-family:inherit;cursor:pointer;color:inherit}
  input{font-family:inherit}
  a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:4px}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#232428;border-radius:6px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-track{background:transparent}

  /* ============ ONBOARDING ============ */
  #onboard{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;position:relative;overflow:hidden}
  #dots{position:absolute;inset:0;-webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 75%);mask-image:radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 75%)}
  .ob-in{position:relative;z-index:2;width:100%;max-width:520px}
  #onboard h1{margin-top:34px;font-size:clamp(28px,4.4vw,40px);letter-spacing:-.03em;font-weight:600;line-height:1.1}
  #onboard p.s{margin-top:12px;color:var(--dim);font-size:15px}
  .urlbox{margin-top:32px;display:flex;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px}
  .urlbox:focus-within{border-color:var(--acc)}
  .urlbox input{flex:1;background:transparent;border:0;color:var(--fg);font-family:'Geist Mono',monospace;font-size:14px;padding:10px 12px;outline:none}
  .urlbox input::placeholder{color:var(--faint)}
  .go{background:var(--fg);color:#000;border:0;border-radius:7px;font-weight:600;font-size:13.5px;padding:0 20px;transition:opacity .15s}
  .go:hover{opacity:.85}
  .go:disabled{opacity:.4;cursor:default}
  .ob-note{margin-top:14px;font-family:'Geist Mono',monospace;font-size:11.5px;color:var(--faint)}
  #progress{margin-top:36px;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px 20px;font-family:'Geist Mono',monospace;font-size:12.5px;line-height:2.1;display:none}
  #progress .pl{color:var(--dim)}
  #progress .pl.done{color:var(--green)}
  #progress .pl .spin{display:inline-block;animation:rot 1s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  @media(prefers-reduced-motion:reduce){#progress .pl .spin{animation:none}}

  /* ============ APP ============ */
  #app{display:none;height:100svh;flex-direction:column;overflow:hidden}

  /* topbar */
  .topbar{height:50px;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#000;border-bottom:1px solid var(--line)}
  .tb-l{display:flex;align-items:center;gap:14px}
  .tb-l img{height:13px;image-rendering:pixelated}
  .tb-l .sep{color:var(--faint);font-family:'Geist Mono',monospace;font-size:11px}
  .tb-r{display:flex;align-items:center;gap:12px;font-family:'Geist Mono',monospace;font-size:11px;color:var(--dim)}
  .tb-r .credits{color:var(--acc)}
  .avatar{width:22px;height:22px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);display:grid;place-items:center;font-size:10px;color:var(--dim)}

  /* terminal strip */
  .termstrip{flex:0 0 auto;height:150px;background:#000;border-bottom:1px solid var(--line);overflow:hidden;position:relative}
  .termstrip .tlog{position:absolute;inset:0;padding:10px 16px;font-family:'Geist Mono',monospace;font-size:12px;line-height:1.85;overflow-y:auto;color:var(--dim)}
  .tlog .tl-p{color:var(--acc)}
  .tlog .tl-ok{color:var(--green)}
  .tlog .tl-dim{color:var(--faint)}
  .term-toggle{position:absolute;top:6px;right:10px;z-index:2;background:transparent;border:0;color:var(--faint);font-family:'Geist Mono',monospace;font-size:11px}
  .term-toggle:hover{color:var(--fg)}
  #app.term-collapsed .termstrip{height:34px}
  #app.term-collapsed .tlog{overflow:hidden}

  /* dashboard grid */
  .dash{flex:1;display:grid;grid-template-columns:250px minmax(340px,1fr) 300px 330px;min-height:0}
  .col{border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;min-width:0}
  .col:last-child{border-right:0}
  .col-head{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line)}
  .col-head .ct{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px}
  .col-head .ct .ic{color:var(--faint);font-family:'Geist Mono',monospace;font-size:12px}
  .col-head .ca{display:flex;gap:10px;color:var(--faint);font-size:12px}
  .col-head .ca button{background:none;border:0;color:var(--faint);font-size:12px}
  .col-head .ca button:hover{color:var(--fg)}
  .col-body{flex:1;overflow-y:auto;min-height:0;padding:14px}

  @media(max-width:1180px){
    .dash{grid-template-columns:1fr 1fr;grid-auto-rows:minmax(320px,48svh);overflow-y:auto}
    .col{border-bottom:1px solid var(--line)}
    .col:nth-child(2n){border-right:0}
  }
  @media(max-width:720px){
    #app{height:auto;overflow:visible}
    .dash{grid-template-columns:1fr;grid-auto-rows:auto;overflow:visible}
    .col{border-right:0;max-height:none}
    .col-body{overflow:visible}
  }

  /* ---- company col ---- */
  .company-desc{color:var(--dim);font-size:12.5px;line-height:1.65}
  .docrow{display:flex;align-items:center;gap:9px;width:100%;background:none;border:0;text-align:left;padding:7px 8px;border-radius:7px;color:var(--fg);font-size:12.5px;font-weight:500}
  .docrow:hover{background:var(--panel)}
  .docrow .di{color:var(--faint);font-family:'Geist Mono',monospace;font-size:11px}
  .docrow .new{margin-left:auto;font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.08em;color:var(--green);border:1px solid rgba(62,207,142,.35);border-radius:4px;padding:1px 6px}
  .docrow .cnt{margin-left:auto;color:var(--faint);font-size:11px}
  .comp-row{display:flex;align-items:center;gap:8px;padding:6px 8px;font-size:12.5px;color:var(--dim)}
  .comp-row .cdot{width:14px;height:14px;border-radius:4px;display:grid;place-items:center;font-size:8px;font-family:'Geist Mono',monospace}
  .sect{margin-top:20px}
  .sect .label{display:block;margin-bottom:8px}

  /* ---- analytics col ---- */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);padding:0 14px;flex:0 0 auto}
  .tab{background:none;border:0;color:var(--faint);font-size:12.5px;font-weight:500;padding:9px 10px;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab:hover{color:var(--fg)}
  .tab.on{color:var(--fg);border-bottom-color:var(--acc)}
  .rangebar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .rangebar .rlabel{color:var(--faint);font-size:12px}
  .pillset{display:flex;gap:6px}
  .rpill{background:var(--panel);border:1px solid var(--line);color:var(--dim);border-radius:100px;font-size:11.5px;font-weight:500;padding:4px 12px}
  .rpill.on{background:var(--fg);color:#000;border-color:var(--fg)}
  .an-h{font-size:14.5px;font-weight:600}
  .an-s{color:var(--faint);font-size:12px;margin-top:2px}
  .statgrid{display:flex;align-items:stretch;gap:0;background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-top:14px;padding:16px 0}
  .stat{flex:1;text-align:center;padding:0 8px;border-right:1px solid var(--line)}
  .stat:last-child{border-right:0}
  .stat .sl{color:var(--faint);font-size:11px}
  .stat .sv{font-size:22px;font-weight:600;letter-spacing:-.03em;margin-top:2px}
  .stat .sd{font-family:'Geist Mono',monospace;font-size:10.5px;color:var(--green);margin-top:2px}
  .statfoot{display:flex;gap:18px;justify-content:center;border-top:1px solid var(--line);margin-top:14px;padding-top:12px;font-size:11.5px;color:var(--faint)}
  .statfoot b{color:var(--dim);font-weight:600}
  .chartbox{margin-top:8px}
  .chartbox svg{width:100%;height:150px;display:block}
  .legend{display:flex;gap:16px;margin-top:6px;font-size:11px;color:var(--faint)}
  .legend i{display:inline-block;width:14px;height:2px;background:var(--acc);vertical-align:middle;margin-right:5px}
  .legend .l2 i{background:var(--faint);height:0;border-top:2px dashed var(--faint)}
  .rankrow{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);font-size:12.5px}
  .rankrow:last-child{border-bottom:0}
  .rankpos{font-family:'Geist Mono',monospace;font-size:11px;color:var(--acc);background:rgba(205,166,242,.08);border:1px solid rgba(205,166,242,.25);border-radius:5px;padding:2px 7px;min-width:34px;text-align:center}
  .rankrow .rq{flex:1;color:var(--dim)}
  .rankrow .rt{font-family:'Geist Mono',monospace;font-size:10.5px;color:var(--green)}
  .placeholder{border:1px dashed var(--line);border-radius:10px;padding:28px;text-align:center;color:var(--faint);font-size:12.5px;margin-top:14px}

  /* ---- agents feed ---- */
  .agent{border:1px solid var(--line);border-radius:10px;background:var(--panel);margin-bottom:8px;overflow:hidden}
  .agent-head{display:flex;align-items:center;gap:10px;width:100%;background:none;border:0;padding:11px 12px;text-align:left}
  .agent-head:hover{background:var(--panel2)}
  .aico{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto;background:color-mix(in srgb,var(--ac,#CDA6F2) 12%,transparent);border:1px solid color-mix(in srgb,var(--ac,#CDA6F2) 24%,transparent);color:var(--ac,#CDA6F2)}
  .aico svg{width:14px;height:14px;display:block}
  .agent-head .an{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg);font-weight:500}
  .agent-head .as{color:var(--dim);font-size:12px;margin-top:1px}
  .agent-head .chev{margin-left:auto;color:var(--faint);font-size:11px;transition:transform .15s}
  .agent.open .chev{transform:rotate(180deg)}
  .agent-body{display:none;border-top:1px solid var(--line);padding:6px 12px 10px}
  .agent.open .agent-body{display:block}
  .aitem{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12px;color:var(--dim)}
  .aitem:last-child{border-bottom:0}
  .aitem .go2{margin-left:auto;background:none;border:1px solid var(--line);border-radius:6px;color:var(--dim);font-size:11px;padding:3px 10px;white-space:nowrap}
  .aitem .go2:hover{color:var(--fg);border-color:var(--faint)}

  /* ---- chat col ---- */
  .chat-body{display:flex;flex-direction:column;gap:10px;padding-bottom:6px}
  .msg{max-width:88%;border-radius:12px;padding:9px 12px;font-size:12.5px;line-height:1.55;white-space:pre-wrap}
  .msg.ai{background:var(--panel);border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:4px;color:#C9CAD1}
  .msg.me{background:var(--acc);color:#000;align-self:flex-end;border-bottom-right-radius:4px;font-weight:500}
  .msg-meta{font-family:'Geist Mono',monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);align-self:flex-start;margin:2px 2px -6px}
  .msg-meta.me{align-self:flex-end}
  .chat-foot{flex:0 0 auto;border-top:1px solid var(--line);padding:10px 12px}
  .chatbox{display:flex;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px 4px 4px 12px}
  .chatbox:focus-within{border-color:var(--acc)}
  .chatbox input{flex:1;background:transparent;border:0;outline:none;color:var(--fg);font-size:12.5px}
  .chatbox input::placeholder{color:var(--faint)}
  .send{background:var(--fg);color:#000;border:0;border-radius:7px;width:30px;height:30px;font-weight:600}
  .send:hover{opacity:.85}
  .typing{color:var(--faint);font-family:'Geist Mono',monospace;font-size:11px;align-self:flex-start;padding:2px}

  /* ---- doc drawer (right slide-over) ---- */
  .docwrap{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:70;display:none}
  .docwrap.open{display:block}
  .docpanel{position:absolute;top:0;right:0;bottom:0;width:min(600px,100%);background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column}
  .doc-head{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--line)}
  .doc-head .dt{font-size:15px;font-weight:600;flex:1}
  .doc-head button{background:none;border:0;color:var(--faint);font-size:13px;padding:4px 6px}
  .doc-head button:hover{color:var(--fg)}
  .doc-body{flex:1;overflow-y:auto;padding:22px 24px;font-size:13px;color:#C9CAD1;white-space:pre-wrap;line-height:1.75;font-family:'Geist Mono',monospace}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 18px;font-size:13px;z-index:90;display:none}
</style>
</head>
<body>

<!-- ============ ONBOARDING ============ -->
<div id="onboard">
  <canvas id="dots" aria-hidden="true"></canvas>
  <div class="ob-in">
    <img src="logo.png" alt="cosmos.ai" style="height:28px;image-rendering:pixelated">
    <h1>What are we growing?</h1>
    <p class="s">Paste your website. Cosmos reads it, figures out your positioning, and builds today's plan.</p>
    <div class="urlbox">
      <input id="url" type="url" placeholder="https://yourcompany.com" autocomplete="off" spellcheck="false">
      <button class="go" id="analyze">Analyze →</button>
    </div>
    <p class="ob-note">read-only · nothing publishes without you</p>
    <div id="progress"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">

  <div class="topbar">
    <div class="tb-l">
      <img src="logo.png" alt="cosmos.ai">
      <span class="sep">·</span>
      <span class="mono" style="font-size:11px;color:var(--dim)">AI CMO Terminal · running daily</span>
    </div>
    <div class="tb-r">
      <span class="credits">∞ credits</span>
      <span class="avatar" id="avatarInit">–</span>
    </div>
  </div>

  <div class="termstrip">
    <button class="term-toggle" id="termToggle">[–] collapse</button>
    <div class="tlog" id="tlog"></div>
  </div>

  <div class="dash">

    <!-- COMPANY -->
    <div class="col">
      <div class="col-head">
        <span class="ct"><span class="ic">▤</span>Company</span>
        <span class="ca"><button title="Settings" id="resetApp">⚙</button></span>
      </div>
      <div class="col-body">
        <p class="company-desc" id="companyDesc">—</p>

        <div class="sect">
          <span class="label">Documents</span>
          <div id="docList"></div>
        </div>

        <div class="sect">
          <span class="label">Competitors</span>
          <div id="compList"></div>
        </div>
      </div>
    </div>

    <!-- ANALYTICS -->
    <div class="col">
      <div class="col-head">
        <span class="ct"><span class="ic">∿</span>Analytics</span>
      </div>
      <div class="tabs" id="anTabs">
        <button class="tab on" data-tab="traffic">Traffic</button>
        <button class="tab" data-tab="seo">SEO</button>
        <button class="tab" data-tab="links">Links</button>
        <button class="tab" data-tab="technical">Technical</button>
        <button class="tab" data-tab="geo">GEO</button>
      </div>
      <div class="col-body" id="anBody"></div>
    </div>

    <!-- AGENTS FEED -->
    <div class="col">
      <div class="col-head">
        <span class="ct"><span class="ic">≋</span>Agents Feed</span>
        <span class="ca"><button title="Refresh">↻</button></span>
      </div>
      <div class="col-body" id="feedBody"></div>
    </div>

    <!-- TALK TO AI CMO -->
    <div class="col">
      <div class="col-head">
        <span class="ct"><span class="ic">◍</span>Talk to AI CMO</span>
      </div>
      <div class="col-body chat-body" id="chatBody"></div>
      <div class="chat-foot">
        <div class="chatbox">
          <input id="chatIn" placeholder="Ask me anything…" autocomplete="off">
          <button class="send" id="chatSend" aria-label="Send">↑</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- doc drawer -->
<div class="docwrap" id="docwrap">
  <div class="docpanel">
    <div class="doc-head">
      <span class="dt" id="docTitle"></span>
      <button id="docCopy" title="Copy">⧉ copy</button>
      <button id="docClose" title="Close">✕</button>
    </div>
    <div class="doc-body" id="docBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ================= STATE ================= */
const S = {
  url:'', profile:null,
  agents:[
    {id:'reddit',  name:'Reddit Agent',    color:'#FF4500', glyph:'r/', sum:'36 opportunities ready',
      items:[['Thread: "tools for early-stage marketing?" — high intent','Draft reply'],['Thread: "is SEO dead in 2026?" — position cosmos','Draft reply'],['Thread: "AI CMO tools worth it?" — direct match','Draft reply']]},
    {id:'geo',     name:'GEO Agent',       color:'#5A8DE8', glyph:'✦', sum:'11 citation gaps detected',
      items:[['Not cited for "ai marketing automation" in ChatGPT','Fix gap'],['Perplexity cites 2 competitors for your core query','Fix gap']]},
    {id:'seo',     name:'SEO Agent',       color:'#CDA6F2', glyph:'◎', sum:'46 recommendations ready',
      items:[['12 pages missing meta descriptions','Review'],['Keyword gap: "marketing copilot" — 2.1k/mo, low difficulty','Draft post']]},
    {id:'x',       name:'X Agent',         color:'#FAFAFA', glyph:'𝕏', sum:'137 ideas ready',
      items:[['Thread idea: "we skipped 80% of our marketing tasks"','Draft'],['Post: launch-week metrics recap','Draft']]},
    {id:'articles',name:'Articles Agent',  color:'#9A6AE8', glyph:'≡', sum:'32 topics ready',
      items:[['"AI CMO vs marketing agency: real math" — outline ready','Open'],['"how to get cited by ChatGPT" — research done','Open']]},
    {id:'hn',      name:'Hacker News Agent',color:'#FF6600', glyph:'Y', sum:'1 post ready',
      items:[['Show HN draft: "Cosmos — an AI CMO that says no"','Review']]},
    {id:'linkedin',name:'LinkedIn Agent',  color:'#0A66C2', glyph:'in', sum:'3 posts ready',
      items:[['Founder post: why we skip most marketing tasks','Review']]},
    {id:'ugc',     name:'UGC Videos Agent',color:'#E8843A', glyph:'▶', sum:'1 video · 1 completed',
      items:[['15s product clip — ready to preview','Preview']]},
    {id:'infl',    name:'Influencer Campaigns',color:'#3ECF8E', glyph:'★', sum:'Launch your first campaign',
      items:[['23 creators scored for audience fit','Open list']]},
  ],
  docs:[
    {id:'product',  name:'Product Information', icon:'▤'},
    {id:'compet',   name:'Competitor Analysis', icon:'▥'},
    {id:'voice',    name:'Brand Voice',         icon:'✎'},
    {id:'strategy', name:'Marketing Strategy',  icon:'◎'},
    {id:'llms',     name:'llms.txt',            icon:'⌥', tag:'new'},
    {id:'articles', name:'Articles',            icon:'▸', count:'(39)'},
  ],
  competitors:[{n:'okara.ai',c:'#E86A3A'},{n:'jasper.ai',c:'#5A8DE8'},{n:'hubspot.com',c:'#E8843A'}],
  range:'7d', tab:'traffic',
  chat:[]
};

/* ================= AI API (proxied through server.py — key never reaches the browser) ================= */
async function ai(prompt, opts={}){
  const r = await fetch('/api/generate',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt, url:opts.url||null})
  });
  const data = await r.json().catch(()=>({}));
  if(!r.ok || data.error) throw new Error(data.error||('api '+r.status));
  return data.text;
}
function parseJSON(txt){
  const clean = txt.replace(/```json|```/g,'').trim();
  const s = clean.indexOf('{'), e = clean.lastIndexOf('}');
  return JSON.parse(clean.slice(s, e+1));
}

/* ================= ONBOARDING ================= */
const steps = ['reading your site','building product profile','checking channels','scoring opportunities','writing today’s plan'];
document.getElementById('analyze').addEventListener('click', analyze);
document.getElementById('url').addEventListener('keydown', e=>{ if(e.key==='Enter') analyze(); });

async function analyze(){
  let u = document.getElementById('url').value.trim();
  if(!u) return;
  if(!/^https?:\/\//.test(u)) u = 'https://'+u;
  S.url = u;
  const btn = document.getElementById('analyze'); btn.disabled = true;
  const prog = document.getElementById('progress');
  prog.style.display='block';
  prog.innerHTML = steps.map((s,i)=>`<div class="pl" id="st${i}"><span class="spin" style="display:none">◐</span><span class="dot0">○</span> ${s}</div>`).join('');
  const tick = i=>{ const el=document.getElementById('st'+i); if(!el)return;
    el.querySelector('.dot0').style.display='none'; el.querySelector('.spin').style.display='inline-block'; };
  const done = i=>{ const el=document.getElementById('st'+i); if(!el)return;
    el.classList.add('done'); el.querySelector('.spin').style.display='none';
    el.querySelector('.dot0').style.display='inline'; el.querySelector('.dot0').textContent='●'; };

  try{
    tick(0); tick(1);
    const profileTxt = await ai(
`Analyze the website ${S.url} using the page content above.
Respond ONLY with JSON, no markdown fences, no preamble:
{"name":"company name","oneLiner":"what it does in one sentence","audience":"who buys it","positioning":"2-sentence positioning summary","competitors":["3-4 names"],"voice":"3 adjectives for brand voice","description":"a 4-sentence company overview for a dashboard sidebar"}`, {url:S.url});
    S.profile = parseJSON(profileTxt);
    if(S.profile.competitors) S.competitors = S.profile.competitors.slice(0,4).map((n,i)=>({n, c:['#E86A3A','#5A8DE8','#E8843A','#9A6AE8'][i%4]}));
    done(0); done(1); tick(2); tick(3); done(2); done(3); tick(4); done(4);
    enterApp();
  }catch(err){
    S.profile = {
      name: hostOf(S.url), oneLiner:'(demo mode — API unreachable)',
      audience:'early-stage teams', voice:'clear, direct, useful',
      positioning:'Demo data shown. Re-run analysis when online.',
      description:'Cosmos is your AI CMO for teams who cannot afford a full marketing department. It researches opportunities, drafts content, and audits technical SEO across Reddit, LinkedIn, X, Hacker News and organic search — with every output queued for human review before anything goes live. It replaces the combined workflow of an SEO agency, a content writer, and a social media manager at a fraction of the cost.'
    };
    steps.forEach((_,i)=>done(i));
    enterApp();
    toast('Running in demo mode — data is illustrative.');
  }
}

function chartSVG(d){
  const W=560,H=150,P=10;
  const max = Math.max(...d.visits)*1.15;
  const pt = (arr,i)=>[P+i*(W-2*P)/(arr.length-1), H-P-(arr[i]/max)*(H-2*P)];
  const line = arr=>arr.map((_,i)=>pt(arr,i).map(n=>n.toFixed(1)).join(',')).join(' ');
  const area = `${P},${H-P} ${line(d.visits)} ${W-P},${H-P}`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="Traffic over time">
    <polygon points="${area}" fill="rgba(205,166,242,.10)"/>
    <polyline points="${line(d.visits)}" fill="none" stroke="#CDA6F2" stroke-width="2"/>
    <polyline points="${line(d.clicks)}" fill="none" stroke="#55565E" stroke-width="1.5" stroke-dasharray="4 4"/>
    ${d.visits.map((_,i)=>{const[x,y]=pt(d.visits,i);return `<circle cx="${x}" cy="${y}" r="2.6" fill="#CDA6F2"/>`}).join('')}
  </svg>

/* ================= DOT GRID BG (onboarding) ================= */
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
const dcv=document.getElementById('dots'), dg=dcv.getContext('2d');
let DW,DH,GAP,pts=[];
function dsize(){ const r=dcv.parentElement.getBoundingClientRect();
  DW=dcv.width=r.width*devicePixelRatio; DH=dcv.height=r.height*devicePixelRatio;
  dcv.style.width=r.width+'px'; dcv.style.height=r.height+'px';
  GAP=26*devicePixelRatio; pts=[];
  for(let y=GAP/2;y<DH;y+=GAP)for(let x=GAP/2;x<DW;x+=GAP)pts.push({x,y,ph:x*.011+y*.017}); }
dsize(); addEventListener('resize',dsize);
function ddraw(t){ dg.clearRect(0,0,DW,DH); const tt=t*.00028;
  for(const d of pts){ const w=Math.sin(d.x*.0016+d.y*.0011+tt*2+d.ph)*.5+.5;
    const w2=Math.sin(d.y*.002-tt*1.4)*.5+.5; const b=w*.7+w2*.3;
    const a=.03+b*.10, s=(1.1+b*1.9)*devicePixelRatio;
    dg.fillStyle=`rgba(250,250,250,${a.toFixed(3)})`; dg.fillRect(d.x-s/2,d.y-s/2,s,s); }
  if(!reduce && document.getElementById('onboard').style.display!=='none') requestAnimationFrame(ddraw); }
if(reduce) ddraw(0); else requestAnimationFrame(ddraw);
